<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>CiteFlow Desktop App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <style>
        body { overflow: hidden; } /* Verhindert Scrollen der ganzen Seite -> App-Feeling */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- BEREICH DEINER KOMMILITONEN (BEISPIEL: BIBLIOTHEK) ---
        function MainContent() {
            return (
                <div className="flex-1 bg-white overflow-y-auto custom-scrollbar p-6">
                    <h1 className="text-2xl font-bold mb-4">Bibliothek</h1>
                    <p className="text-slate-500">Hier fügen deine Kommilitonen ihre Funktionen ein (Listen, Thumbnails, etc.).</p>
                    {/* HIER PLATZHALTER FÜR TEAM-PART */}
                    <div className="mt-8 border-2 border-dashed border-slate-200 rounded-xl h-64 flex items-center justify-center text-slate-400">
                        Bereich für Bibliothek & Planner
                    </div>
                </div>
            );
        }

        // --- DEIN BEREICH (KI-CHAT SIDEBAR) ---
        function AIChatSidebar() {
            return (
                <div className="w-80 bg-slate-50 border-l flex flex-col h-full shadow-lg">
                    <div className="p-4 border-b bg-white font-bold text-blue-700 flex items-center gap-2">
                        <i className="lucide-message-square w-5 h-5"></i> CiteFlow AI
                    </div>
                    <div className="flex-1 p-4 overflow-y-auto custom-scrollbar text-sm italic text-slate-500">
                        Dein KI-Chat-Code kommt hier rein...
                    </div>
                    <div className="p-4 border-t bg-white">
                        <input className="w-full bg-slate-100 p-2 rounded text-xs" placeholder="Frag die KI..." />
                    </div>
                </div>
            );
        }

        // --- DAS GESAMTGERÜST (APP SHELL) ---
        function CiteFlowApp() {
            return (
                <div className="flex h-screen w-full bg-slate-900 overflow-hidden">
                    {/* Globale Navigation Links */}
                    <div className="w-16 flex flex-col items-center py-6 gap-8 text-slate-400 border-r border-slate-800">
                        <i className="lucide-home w-6 h-6 hover:text-white cursor-pointer"></i>
                        <i className="lucide-book w-6 h-6 hover:text-white cursor-pointer"></i>
                        <i className="lucide-layout-dashboard w-6 h-6 hover:text-white cursor-pointer"></i>
                    </div>

                    {/* Dynamischer Inhalt in der Mitte */}
                    <MainContent />

                    {/* Deine Sidebar Rechts */}
                    <AIChatSidebar />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CiteFlowApp />);
    </script>
</body>
</html>
